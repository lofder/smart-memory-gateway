# ============================================================
# Engram — config.yaml
# Copy this file to config.yaml and customize.
# ============================================================

# --- Agent permissions: who can read/write where ---
agents:
  main:
    read: [global, "group:*", dm, "agent:*", all, "cross:*"]
    write: [global, "group:*", dm]
    allowed_types: [preference, fact, procedure, lesson, decision, task_log, knowledge]
  devops:
    read: [global, "group:*", dm, "agent:*", all, "cross:*"]
    write: [global, "group:*", dm, "agent:*", all, "cross:*"]
    allowed_types: [preference, fact, procedure, lesson, decision, task_log, knowledge]
  # Add more agents as needed:
  # worker:
  #   read: []
  #   write: ["agent:worker"]
  #   allowed_types: [procedure, task_log]

default_agent_policy:
  read: [global]
  write: []
  allowed_types: []

# --- Memory type definitions ---
memory_types:
  preference: {decay: never, conflict: update_latest}
  fact: {decay: never, conflict: verify_source}
  procedure: {decay: half_life_90d, conflict: keep_latest_version}
  lesson: {decay: never, conflict: no_override}
  task_log: {decay: half_life_30d, conflict: no_dedup}
  decision: {decay: never, conflict: no_override}
  knowledge: {decay: never, conflict: merge_latest}

# --- LLM for day-to-day operations (Mem0 internal use) ---
llm:
  model: gpt-4o-mini
  base_url: https://api.openai.com/v1
  # If using host config.json providers, set this:
  # provider_name: your-provider

# --- Maintenance settings ---
maintenance:
  daily_time: "03:00"
  weekly_day: sunday
  weekly_window_minutes: 30
  dedup_auto_threshold: 0.92
  dedup_candidate_threshold: 0.85
  # LLM chain for maintenance (re-extraction, conflict resolution, consolidation)
  # Format: provider-name/model-name — tries in order, falls back on failure
  llm_chain:
    - default/gpt-4o
  # Base URL for maintenance LLM (fallback if provider not in host config)
  llm_base_url: https://api.openai.com/v1

quality_tier: high

# --- Embedding configuration ---
embedding:
  model: models/gemini-embedding-001
  # If using host config.json providers for embedding fallback:
  # provider_name: your-provider
  primary:
    provider: gemini
    model: models/gemini-embedding-001
    dimensions: 3072
  fallback:
    provider: openai
    model: gemini-embedding-001
    base_url: https://your-embedding-proxy.com/v1
    dimensions: 3072

# --- Qdrant vector database ---
qdrant:
  host: localhost
  port: 6333
  collection: memories

# --- Decay parameters ---
decay:
  task_log_half_life_days: 30
  procedure_half_life_days: 90
  access_count_cap: 3.0
  archive_threshold: 0.10

# --- Credential safety: matching patterns are NEVER stored ---
never_store_patterns:
  - 'sk-[A-Za-z0-9]{20,}'
  - 'AIza[0-9A-Za-z_-]{20,}'
  - 'password\s*[:=]\s*\S+'
  - 'token\s*[:=]\s*\S+'
  - 'cookie\s*[:=]\s*\S+'
  - '-----BEGIN\s+(RSA\s+)?PRIVATE'

# --- Optional: webhook notification (Slack, Feishu, Discord, etc.) ---
# notification:
#   webhook_url: https://hooks.slack.com/services/xxx/yyy/zzz

schema_version: 1
config_version: 2
