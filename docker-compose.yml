services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  engram:
    build: .
    depends_on:
      - qdrant
    env_file:
      - .env
    environment:
      - ENGRAM_CONFIG=/app/config.yaml
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    restart: unless-stopped

volumes:
  qdrant_data:
